<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>360° Viewer</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div id="main">
    <div id="sidebar"></div>
    <div id="viewer-wrap">
      <div id="viewer"></div>
      <div id="horizon"></div>
      <div id="vertical"></div>
    </div>
  </div>
  <div id="bar">
    <div id="nav">
      <button id="btn-prev">&#8592; Prev</button>
      <button id="btn-next">Next &#8594;</button>
      <button id="btn-toggle" class="on">Correction ON</button>
    </div>
    <span id="filename">—</span>
    <span id="inlier"></span>
    <div id="controls">
      <label>roll  <input id="sl-roll"  type="range" min="-45" max="45" step="0.1" value="0"><span id="val-roll"  class="val">0.0°</span></label>
      <label>pitch <input id="sl-pitch" type="range" min="-45" max="45" step="0.1" value="0"><span id="val-pitch" class="val">0.0°</span></label>
      <button id="btn-reset" title="Reset to original values">&#8635;</button>
    </div>
    <span id="counter"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.js"></script>
  <script src="{{ url_for('static', filename='viewer.js') }}"></script>
</body>
</html>
